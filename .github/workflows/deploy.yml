name: Deploy Streamlit App (Venv Externo)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_PATH: /home/dietpi/cognidata/cognidata.db

    steps:
      - name: 1. Obter código (O Git pode limpar à vontade agora)
        uses: actions/checkout@v4

      - name: 1.5. Verificar e criar diretório de dados se necessário
        run: |
          if [ ! -d "/home/dietpi/cognidata" ]; then
            echo "Diretório de dados não existe, criando..."
            mkdir -p /home/dietpi/cognidata
            echo "✓ Diretório criado: /home/dietpi/cognidata"
          else
            echo "✓ Diretório de dados já existe"
            if [ -f "/home/dietpi/cognidata/cognidata.db" ]; then
              echo "✓ Database encontrada, dados serão preservados"
            fi
          fi

      - name: 2. Atualizar dependências no Venv Fixo
        run: |
          # Usamos o pip do venv que reside fora da pasta do projeto
          ~/streamlit_venv/bin/pip install --upgrade pip --quiet
          if [ -f requirements.txt ]; then 
            # O pip vai ver que já está tudo instalado e demora 2 segundos
            ~/streamlit_venv/bin/pip install -r requirements.txt --quiet
          fi

      - name: 3. Validar Secrets
        run: |
          if [ -z "${{ secrets.ADMIN_PASSWORD }}" ] || [ -z "${{ secrets.AUTH_SECRET_KEY }}" ]; then
            echo "ERROR: Missing required GitHub Secrets"
            echo "Please configure ADMIN_PASSWORD and AUTH_SECRET_KEY in:"
            echo "  Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✓ Secrets validados (valores mascarados nos logs)"

      - name: 4. Lançar App
        env:
          RUNNER_TRACKING_ID: ""
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}
        run: |
          # Libertar a porta 8501
          fuser -k 8501/tcp || true
          
          # Lançar usando o python do venv externo
          # ADMIN_PASSWORD e AUTH_SECRET_KEY carregados de GitHub Secrets
          nohup ~/streamlit_venv/bin/streamlit run app.py \
            --server.port 8501 \
            --server.address 0.0.0.0 \
            --server.headless true > streamlit_output.log 2>&1 &
          
          disown
          echo "Deploy concluído com venv persistente."
          echo "Database localizado em: $DATABASE_PATH"
          echo "✓ Secrets carregados do GitHub (valores mascarados nos logs)"

      - name: 5. Validar estado
        run: |
          sleep 5
          pgrep -f streamlit > /dev/null && echo "✓ App online!" || exit 1
